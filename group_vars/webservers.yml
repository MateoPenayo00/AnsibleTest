---
# ---------------------------------------------------------------------------
# group_vars/webservers.yml
# Configuration for every host in the`webservers inventory group. 
#
# This file supports TWO webserver backends, nginx and httpd (Apache), but each host only runs ONE at a time.

# ---------------------------------------------------------------------------
# webserver_package is the single source of truth for which backend this host runs. 
# Valid values: "nginx" or "httpd". 

webserver_package: httpd

# ---------------------------------------------------------------------------
# Shared settings (apply no matter which backend is selected)
webserver_index_content: "Welcome to My Web Server"

# Path to the default index file. Computed from webserver_package via a dict lookup rather than hardcoded, 
# since nginx and httpd use different default docroots on Debian. 
webserver_index_path: "{{ {'nginx': '/usr/share/nginx/html/index.html',
                            'httpd': '/var/www/html/index.html'}[webserver_package] }}"


# ---------------------------------------------------------------------------
# NGINX CONFIGURATION
# OS user nginx worker processes run as. Auto-detected; you shouldn't need
# to change this unless you're on an unusual distro.

nginx_user: "{{ 'www-data' if ansible_os_family == 'Debian' else 'nginx' }}"

# OS service name. Always "nginx" 
nginx_service_name: nginx

# Number of nginx worker processes. "auto" matches it to available CPU cores 
nginx_worker_processes: auto

# Max simultaneous connections each worker process can hold open.
nginx_worker_connections: 1024

# Seconds an idle keep-alive connection is held open before nginx closes it.
nginx_keepalive_timeout: 65

# Max allowed size of a client request body (e.g. file uploads)
nginx_client_max_body_size: 10m

# Enables gzip compression for the response types listed below.
nginx_gzip_enabled: true
nginx_gzip_types:
  - text/plain
  - text/css
  - application/json
  - application/javascript
  - text/xml
  - application/xml

# ---------------------------------------------------------------------------
# Server blocks (virtual hosts) — feeds templates/server_block.conf.j2
# Each item becomes its own file: /etc/nginx/conf.d/<name>.conf
#
# A block is exactly one of three things, decided by which keys are set:
#   1. Redirect-only  — redirect_to_https: true (ignores root/index/proxy_pass)
#   2. Reverse proxy   — proxy_pass set to a name from nginx_upstreams below
#   3. Static content  — root + index set, proxy_pass omitted
nginx_server_blocks:
  - name: app.example.com        # also used as the conf.d filename stem
    listen_port: 80
    server_name: app.example.com
    root: /usr/share/nginx/html
    index: index.html
    redirect_to_https: true      # 80 -> 443 redirect; root/index above are unused on this block

  - name: api.example.com
    listen_port: 443
    server_name: api.example.com
    ssl_enabled: false           # set true once a real cert exists at nginx_ssl_cert_path below
    proxy_pass: "http://api_backend"   # must match a `name:` in nginx_upstreams below

# ---------------------------------------------------------------------------
# Reverse proxy / upstream pools — feeds templates/server_block.conf.j2
# Backend pools that a server block can point at via proxy_pass
nginx_upstreams:
  - name: api_backend             # referenced by `proxy_pass: "http://api_backend"` above
    strategy: least_conn          # load-balancing algorithm: omit for round-robin (nginx default), or least_conn / ip_hash
    servers:                      # backend servers in the pool
      - address: 10.0.1.11:8080
        weight: 1                 # higher weight = receives proportionally more traffic
      - address: 10.0.1.12:8080
        weight: 1
      - address: 10.0.1.13:8080
        weight: 2


# Timeouts/buffers for proxied requests (only relevant to blocks using proxy_pass).
nginx_proxy_connect_timeout: 5s
nginx_proxy_read_timeout: 60s
nginx_proxy_send_timeout: 60s
nginx_proxy_buffer_size: 4k
nginx_proxy_buffers_number: 8
nginx_proxy_buffers_size: 4k

# ---------------------------------------------------------------------------
# SSL/TLS — feeds templates/nginx.conf.j2 and templates/server_block.conf.j2
# IMPORTANT: this playbook does NOT issue or manage certificates. These
# paths are assumed to already contain a valid cert/key on the target host
nginx_ssl_cert_path: /etc/nginx/ssl/api.example.com.crt
nginx_ssl_key_path: /etc/nginx/ssl/api.example.com.key
nginx_ssl_protocols: "TLSv1.2 TLSv1.3"
nginx_ssl_ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
nginx_ssl_session_cache: "shared:SSL:10m"   # nginx syntax: shared:<name>:<size>
nginx_ssl_session_timeout: "1d"             # nginx accepts time units directly (1d, 30m, etc.)
nginx_hsts_enabled: true
nginx_hsts_max_age: 31536000   # seconds (1 year) — HSTS header lifetime


# ---------------------------------------------------------------------------
# HTTPD (APACHE) CONFIGURATION (httpd_*)
# Only read when webserver_package == 'httpd'

# ---------------------------------------------------------------------------
# Core config — feeds templates/httpd.conf.j2


# OS package name. "apache2" on Debian/Ubuntu, "httpd" on RHEL-family.
httpd_package_name: "{{ 'apache2' if ansible_os_family == 'Debian' else 'httpd' }}"

# OS service name — happens to match the package name on both families, but kept as a separate var in case of distros where this isn't the case.
httpd_service_name: "{{ 'apache2' if ansible_os_family == 'Debian' else 'httpd' }}"

# OS user/group Apache runs as. NOTE: on Debian, these are NOT set via
# User/Group directives in the main conf — Debian's apache2 controls this through /etc/apache2/envvars
httpd_user: "{{ 'www-data' if ansible_os_family == 'Debian' else 'apache' }}"
httpd_group: "{{ 'www-data' if ansible_os_family == 'Debian' else 'apache' }}"

# Email shown on Apache's default error pages / ServerAdmin directive.
httpd_server_admin: webmaster@example.com

# MPM event worker tuning 
httpd_start_servers: 2          # child processes spawned at startup
httpd_min_spare_threads: 25     # minimum idle threads kept ready
httpd_max_spare_threads: 75     # maximum idle threads before some are killed
httpd_thread_limit: 64          # hard cap on threads per child process
httpd_threads_per_child: 25     # threads created per child process
httpd_max_request_workers: 150  # max simultaneous connections server-wide

# Seconds an idle keep-alive connection is held open before Apache closes it.
httpd_keepalive_timeout: 65

# Max allowed size of a client request body. 
httpd_client_max_body_size: 10M

# Enables compression (via mod_deflate) for the response types listed below.
httpd_gzip_enabled: true
httpd_gzip_types:
  - text/plain
  - text/css
  - application/json
  - application/javascript
  - text/xml
  - application/xml

# ---------------------------------------------------------------------------
# Virtual hosts — feeds templates/vhost.conf.j2
# Each item becomes its own file: sites-enabled/<name>.conf (Debian) or
# conf.d/<name>.conf (RHEL-family). 
#
# A vhost is exactly one of two things, decided by redirect_to_https:
#   1. Redirect-only — redirect_to_https: true (ignores document_root/ssl_enabled)
#   2. Content vhost  — serves document_root; add ssl_enabled: true for TLS
#
# Unlike nginx, there is currently no proxy_pass equivalent here — httpd
# vhosts only serve static content.
httpd_vhosts:
  - name: app.example.com          # also used as the sites-enabled/conf.d filename stem
    listen_port: 80
    server_name: app.example.com
    document_root: /var/www/app.example.com
    redirect_to_https: true        # 80 -> 443 redirect only; document_root above is unused on this vhost

  - name: api.example.com
    listen_port: 443
    server_name: api.example.com
    ssl_enabled: false              # requires a real cert at httpd_ssl_cert_path below
    document_root: /var/www/api.example.com

# ---------------------------------------------------------------------------
# SSL/TLS — feeds templates/httpd.conf.j2 and templates/vhost.conf.j2
# Same assumption as nginx_ssl_* above: certs already exist on the target,
# delivered by a separate cert-management process — this playbook doesn't
# issue or manage them.
httpd_ssl_cert_path: /etc/httpd/ssl/api.example.com.crt
httpd_ssl_key_path: /etc/httpd/ssl/api.example.com.key
httpd_ssl_protocols: "TLSv1.2 TLSv1.3"
httpd_ssl_ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
httpd_ssl_session_cache: "shmcb:/var/cache/mod_ssl/scache(512000)"   # mod_ssl syntax: shmcb:<path>(<size_bytes>)
httpd_ssl_session_timeout: 86400   # seconds — mod_ssl wants a raw integer, NOT a unit suffix like nginx's "1d"
httpd_hsts_enabled: true
httpd_hsts_max_age: 31536000       # seconds (1 year) — HSTS header lifetime
