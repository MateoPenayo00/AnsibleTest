---

# ---------------------------------------------------------------------------
# This file is designed to fail to test the block commands in the playbook.
webserver_package: nginx

webserver_index_content: "Welcome to My Web Server"

webserver_index_path: "{{ {'nginx': '/usr/share/nginx/html/index.html',
                            'httpd': '/var/www/html/index.html'}[webserver_package] }}"



nginx_user: "{{ 'www-data' if ansible_os_family == 'Debian' else 'nginx' }}"
nginx_service_name: nginx   # the package name IS the service name for nginx on every distro we target
nginx_worker_processes: auto
nginx_worker_connections: 1024
nginx_keepalive_timeout: 65
nginx_client_max_body_size: 10m

nginx_gzip_enabled: true
nginx_gzip_types:
  - text/plain
  - text/css
  - application/json
  - application/javascript
  - text/xml
  - application/xml


nginx_server_blocks:
  - name: app.example.com
    listen_port: 80
    server_name: app.example.com
    root: /usr/share/nginx/html
    index: index.html
    redirect_to_https: true        # 80 -> 443 redirect, no proxy/static serving on this block

  - name: api.example.com
    listen_port: 443
    server_name: api.example.com
    ssl_enabled: true   # <-- FAIL TEST: changed from false so the broken SSL directive below is actually reached
    proxy_pass: "http://api_backend"   # references the upstream defined below


nginx_upstreams:
  - name: api_backend     #Name for the pool servers that the reverse proxy runs
    strategy: least_conn          # round-robin (default), least_conn, ip_hash
    servers:              #List of servers that run api_backend
      - address: 10.0.1.11:8080
        weight: 1
      - address: 10.0.1.12:8080
        weight: 1
      - address: 10.0.1.13:8080
        weight: 2

nginx_proxy_connect_timeout: 5s
nginx_proxy_read_timeout: 60s
nginx_proxy_send_timeout: 60s
nginx_proxy_buffer_size: 4k
nginx_proxy_buffers_number: 8
nginx_proxy_buffers_size: 4k


nginx_ssl_cert_path: /etc/nginx/ssl/api.example.com.crt
nginx_ssl_key_path: /etc/nginx/ssl/api.example.com.key
nginx_ssl_protocols: "TLSv1.2 TLSv1.3"
nginx_ssl_ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
nginx_ssl_session_cache: "this_is_not_a_valid_ssl_session_cache_value"   # <-- FAIL TEST: nginx requires "off", "none", "builtin[:size]", or "shared:NAME:size"
nginx_ssl_session_timeout: "1d"
nginx_hsts_enabled: true
nginx_hsts_max_age: 31536000   # 1 year, in seconds


httpd_package_name: "{{ 'apache2' if ansible_os_family == 'Debian' else 'httpd' }}"
httpd_service_name: "{{ 'apache2' if ansible_os_family == 'Debian' else 'httpd' }}"

httpd_user: "{{ 'www-data' if ansible_os_family == 'Debian' else 'apache' }}"
httpd_group: "{{ 'www-data' if ansible_os_family == 'Debian' else 'apache' }}"

httpd_server_admin: webmaster@example.com

httpd_start_servers: 2
httpd_min_spare_threads: 25
httpd_max_spare_threads: 75
httpd_thread_limit: 64
httpd_threads_per_child: 25
httpd_max_request_workers: 150

httpd_keepalive_timeout: 65
httpd_client_max_body_size: 10M   # consumed via LimitRequestBody (bytes, converted in template)

httpd_gzip_enabled: true   # maps to mod_deflate
httpd_gzip_types:
  - text/plain
  - text/css
  - application/json
  - application/javascript
  - text/xml
  - application/xml


httpd_vhosts:
  - name: app.example.com
    listen_port: 80
    server_name: app.example.com
    document_root: /var/www/app.example.com
    redirect_to_https: true        # 80 -> 443 redirect only, no content served here

  - name: api.example.com
    listen_port: 443
    server_name: api.example.com
    ssl_enabled: true
    document_root: /var/www/api.example.com


httpd_ssl_cert_path: /etc/httpd/ssl/api.example.com.crt
httpd_ssl_key_path: /etc/httpd/ssl/api.example.com.key
httpd_ssl_protocols: "TLSv1.2 TLSv1.3"
httpd_ssl_ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
httpd_ssl_session_cache: "shmcb:/var/cache/mod_ssl/scache(512000)"
httpd_ssl_session_timeout: 86400   # seconds (1 day) — mod_ssl wants raw seconds, not "1d"
httpd_hsts_enabled: true
httpd_hsts_max_age: 31536000   # 1 year, in seconds
