---
# AnsibleTest — Web server provisioning playbook
# Installs and configures httpd or nginx on every host in the webservers group.
# controlled entirely by the webserver_package variable in group_vars/webservers.yml
#
# Order of operations:
#   1. Stop/disable whichever backend is NOT selected 
#   2. Install the selected package.
#   3. Deploy its config + per-site templates.
#   4. Validate the rendered config
#   5. Start and enable the service.
# Steps 2-5 are wrapped in block/rescue/always 
# -------------------------------------------------------------------

- name: Configure the web server
  hosts: webservers
  # Assumes passwordless sudo is already set up for ansible_user (e.g. via an SSH key + sudoers NOPASSWD entry) otherwise run with `--ask-become-pass` / `-K`.
  become: true

  vars:
    # nginx's package/service name is "nginx" on every distro we target httpd's package is "apache2" on Debian and "httpd" on RHEL-family.
    # Both branches are symmetric — neither nginx_* nor httpd_* need manual edits when switching webserver_package; only the matching block is read.
    _webserver_package_name: "{{ httpd_package_name if webserver_package == 'httpd' else webserver_package }}"
    _webserver_service_name: "{{ httpd_service_name if webserver_package == 'httpd' else nginx_service_name }}"

    # If a host was previously switched from nginx to httpd (or vice versa) the old service is left running and installed unless explicitly
    # deactivated, which causes port 80/443 bind conflicts for the new one.
    _inactive_webserver_service_name: "{{ nginx_service_name if webserver_package == 'httpd' else httpd_service_name }}"

  tasks:
    # Error handling: block / rescue / always
    # Everything that provisions the webserver lives inside this block. Ifany task in it fails, a rescue is executed
    - name: Provision and configure the selected web server
      block:
        # Deactivate whichever webserver ISN'T selected, so switching webserver_package on an already-configured host doesn't leave the old service bound to the same ports as the new one.
        - name: Stop and disable the inactive web server
          ansible.builtin.service:
            name: "{{ _inactive_webserver_service_name }}"
            state: stopped
            enabled: false
          register: _inactive_service_result
          failed_when:
            - _inactive_service_result is failed
            # Tolerate "service not found" but let any other failure (e.g. permissions) surface.
            - "'Could not find the requested service' not in (_inactive_service_result.msg | default(''))"

        - name: Install web server package
          ansible.builtin.package:
            name: "{{ _webserver_package_name }}"
            state: present

        - name: Remove all existing nginx conf.d files before redeploying
          ansible.builtin.file:
            path: /etc/nginx/conf.d
            state: "{{ item }}"
          loop: [absent, directory]
          when: webserver_package == 'nginx'

        - name: Remove all existing httpd vhost files before redeploying
          ansible.builtin.file:
            path: "{{ '/etc/apache2/sites-enabled' if ansible_os_family == 'Debian' else '/etc/httpd/conf.d' }}"
            state: "{{ item }}"
          loop: [absent, directory]
          when: webserver_package == 'httpd'

        # -------------------------------------------------------------------
        # nginx's binary lives in /usr/sbin, same for httpd. Adds it to the PATH
        - name: Ensure /usr/sbin and /sbin are in PATH for interactive shells
          ansible.builtin.lineinfile:
            path: "{{ ansible_env.HOME }}/.bashrc"
            line: 'export PATH=$PATH:/usr/sbin:/sbin'
            create: true
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"

        - name: Deploy custom index page
          ansible.builtin.template:
            src: templates/index.html.j2
            dest: "{{ webserver_index_path }}"
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"
            mode: "0644"
          notify: Reload web service

        # -------------------------------------------------------------------
        # nginx-specific deployment

        - name: Deploy core nginx.conf
          ansible.builtin.template:
            src: templates/nginx.conf.j2
            dest: /etc/nginx/nginx.conf
            group: "{{ ansible_user_id }}"
            mode: "0644"
            validate: nginx -t -c %s
          notify: Reload web service
          when: webserver_package == 'nginx'

        - name: Remove default nginx server block
          ansible.builtin.file:
            path: /etc/nginx/conf.d/default.conf
            state: absent
          notify: Reload web service
          when: webserver_package == 'nginx'

        - name: Deploy server block configs
          ansible.builtin.template:
            src: templates/server_block.conf.j2
            dest: "/etc/nginx/conf.d/{{ server.name }}.conf"
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"
            mode: "0644"
          loop: "{{ nginx_server_blocks }}"
          loop_control:
            loop_var: server
          notify: Reload web service
          when: webserver_package == 'nginx'

        # Validate full config explicitly 
        # failed_when: false here is deliberate it lets the play continue to the targeted "Report ... validation failure" debug task below

        - name: Validate full nginx configuration
          ansible.builtin.command: nginx -t
          register: nginx_config_test
          changed_when: false
          failed_when: false
          when: webserver_package == 'nginx'

        # -------------------------------------------------------------------
        # httpd-specific deployment

        - name: Deploy core httpd.conf
          ansible.builtin.template:
            src: templates/httpd.conf.j2
            dest: "{{ '/etc/apache2/apache2.conf' if ansible_os_family == 'Debian' else '/etc/httpd/conf/httpd.conf' }}"
            group: "{{ ansible_user_id }}"
            mode: "0644"
          notify: Reload web service
          when: webserver_package == 'httpd'

        - name: Remove default httpd site
          ansible.builtin.file:
            path: "{{ '/etc/apache2/sites-enabled/000-default.conf' if ansible_os_family == 'Debian' else '/etc/httpd/conf.d/welcome.conf' }}"
            state: absent
          notify: Reload web service
          when: webserver_package == 'httpd'

        - name: Ensure vhost document roots exist
          ansible.builtin.file:
            path: "{{ vhost.document_root }}"
            state: directory
            owner: "{{ httpd_user }}"
            group: "{{ httpd_group }}"
            mode: "0755"
          loop: "{{ httpd_vhosts }}"
          loop_control:
            loop_var: vhost
          # redirect-only vhosts have no document_root and serve no content
          when: webserver_package == 'httpd' and not (vhost.redirect_to_https | default(false))

        - name: Deploy vhost configs
          ansible.builtin.template:
            src: templates/vhost.conf.j2
            dest: >-
              {{ ('/etc/apache2/sites-enabled/' if ansible_os_family == 'Debian' else '/etc/httpd/conf.d/') ~
                 vhost.name ~ '.conf' }}
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"
            mode: "0644"
          loop: "{{ httpd_vhosts }}"
          loop_control:
            loop_var: vhost
          notify: Reload web service
          when: webserver_package == 'httpd'

        # -------------------------------------------------------------------
        # Validate full config explicitly — httpd equivalent of `nginx -t`.
        # failed_when: false for the same reason as the nginx task above.

        - name: Validate full httpd configuration
          ansible.builtin.command: "{{ 'apache2ctl' if ansible_os_family == 'Debian' else 'httpd' }} -t"
          register: httpd_config_test
          changed_when: false
          failed_when: false
          when: webserver_package == 'httpd'

        # -------------------------------------------------------------------
        # Targeted failure check: config validation is the single most likely failure point in this play. This
        # ansible.builtin.fail task prints the validator's own stderr in its message 
        - name: Fail with details if nginx configuration is invalid
          ansible.builtin.fail:
            msg: >-
              nginx -t reported a configuration error. Check the rendered
              output of templates/nginx.conf.j2 and
              templates/server_block.conf.j2 on the target.
              stderr: {{ nginx_config_test.stderr | default('n/a') }}
          when:
            - webserver_package == 'nginx'
            - nginx_config_test is defined
            - nginx_config_test.rc | default(0) != 0

        - name: Fail with details if httpd configuration is invalid
          ansible.builtin.fail:
            msg: >-
              apache2ctl/httpd -t reported a configuration error. Check the
              rendered output of templates/httpd.conf.j2 and
              templates/vhost.conf.j2 on the target.
              stderr: {{ httpd_config_test.stderr | default('n/a') }}
          when:
            - webserver_package == 'httpd'
            - httpd_config_test is defined
            - httpd_config_test.rc | default(0) != 0

        # -------------------------------------------------------------------
        # Ensure service is enabled and running
        - name: Ensure web server service is enabled and started
          ansible.builtin.service:
            name: "{{ _webserver_service_name }}"
            enabled: true
            state: started

      rescue:
        # Runs only if something above failed. Keeps the failure visible and human-readable instead of just stopping on a raw traceback
        # re-raises afterwards so the play still ends in a failed state
        - name: Report web server provisioning failure
          ansible.builtin.debug:
            msg: >-
              Web server provisioning FAILED for {{ webserver_package }} on
              {{ inventory_hostname }}. Failed task: "{{ ansible_failed_task.name }}".
              Error: {{ ansible_failed_result.msg | default('see task output above') }}

        - name: Re-raise the failure so the play ends in a failed state
          ansible.builtin.fail:
            msg: "Aborting after rescue — see 'Report web server provisioning failure' above for details."

      always:
        # Runs whether the block succeeded or rescue: handled a failure.
        - name: Record which web server backend was targeted this run
          ansible.builtin.debug:
            msg: "Run finished for webserver_package={{ webserver_package }} on {{ inventory_hostname }}."

  handlers:
    - name: Reload web service
      ansible.builtin.service:
        name: "{{ _webserver_service_name }}"
        state: reloaded
