---

- name: Configure the web server
  hosts: webservers
  become: true #Important to create an ssh key and allow user sudo without password prompt, otherwise run with option -K

  tasks:
    - name: Install web server package
      ansible.builtin.package:
        name: "{{ webserver_package }}"
        state: present

    #Nginx runs from /sbin, it must be selected, for this play, the remote user Ansible connected as is named as the group. THis only works if the user's primary group shares the same name
    - name: ensure /usr/sbin and /sbin are in PATH for interactive shells
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc" 
        line: 'export PATH=$PATH:/usr/sbin:/sbin'
        create: true
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Deploy custom index page
      ansible.builtin.template:
        src: templates/index.html.j2
        dest: "{{ webserver_index_path }}"
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
        mode: "0644"
      notify: Reload web service

    - name: Deploy core nginx.conf
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        group: "{{ ansible_user_id }}"
        mode: "0644"
        validate: nginx -t -c %s
      notify: Reload web service
      when: webserver_package == 'nginx'

    - name: Remove default ngingx server block
      ansible.builtin.file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      notify: Reload web service

    - name: Deploy server block configs
      ansible.builtin.template:
        src: templates/server_block.conf.j2
        dest: "/etc/nginx/conf.d/{{ server.name }}.conf"
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
        mode: "0644"
      loop: "{{ nginx_server_blocks }}"
      loop_control:
        loop_var: server
      notify: Reload web service
      when: webserver_package == 'nginx'

   # -------------------------------------------------------------------
    # Validate full config explicitly (belt-and-braces; also acts as a
    # clear failure point if conf.d/*.conf has an issue the per-file
    # `validate:` on nginx.conf wouldn't catch, since conf.d is included)
    # -------------------------------------------------------------------
    - name: Validate full nginx configuration
      ansible.builtin.command: nginx -t
      register: nginx_config_test
      changed_when: false
      when: webserver_package == 'nginx'

    # -------------------------------------------------------------------
    # Ensure service is enabled and running
    # -------------------------------------------------------------------
    - name: Ensure nginx service is enabled and started
      ansible.builtin.service:
        name: "{{ webserver_service }}"
        enabled: true
        state: started

  handlers:
    - name: Reload web service
      ansible.builtin.service:
        name: "{{ webserver_service }}"
        state: reloaded
